<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relationships Assessment — The Young Man Blueprint</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--black:#0a0a0a;--deep:#111318;--panel:#16191f;--border:#22262e;--orange:#e8500a;--amber:#f5a623;--white:#f0ede8;--muted:#7a7f8a;--green:#2dba6e;--red:#e84040;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh;}
.hdr{padding:20px 40px;border-bottom:1px solid var(--border);background:var(--deep);display:flex;justify-content:space-between;align-items:center;}
.back{font-family:'Space Mono',monospace;font-size:0.7rem;letter-spacing:2px;color:var(--muted);text-decoration:none;}.back:hover{color:var(--orange);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px;}.logo span{color:var(--orange);}
.wrap{max-width:760px;margin:0 auto;padding:48px 24px;}
.eyebrow{font-family:'Space Mono',monospace;font-size:0.68rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;text-align:center;}
.title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,6vw,4.5rem);letter-spacing:2px;line-height:1;margin-bottom:14px;text-align:center;}
.sub{color:var(--muted);font-size:0.9rem;line-height:1.7;max-width:480px;margin:0 auto 40px;text-align:center;}
.prog-top{display:flex;justify-content:space-between;font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--muted);margin-bottom:8px;}
.prog-bar{background:var(--border);border-radius:2px;height:5px;overflow:hidden;margin-bottom:32px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--amber));border-radius:2px;transition:width 0.4s;}
.q-card{background:var(--panel);border:1px solid var(--border);padding:32px;border-radius:4px;margin-bottom:20px;}
.q-cat{font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:3px;color:var(--orange);text-transform:uppercase;margin-bottom:10px;}
.q-text{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:1px;line-height:1.2;margin-bottom:22px;}
.opts{display:flex;flex-direction:column;gap:10px;}
.opt{background:var(--deep);border:1.5px solid var(--border);padding:14px 18px;border-radius:4px;cursor:pointer;font-size:0.86rem;display:flex;align-items:center;gap:12px;transition:all 0.15s;}
.opt:hover{border-color:var(--orange);background:#1a1e26;}.opt.sel{border-color:var(--orange);background:rgba(232,80,10,0.1);}
.dot{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;}.opt.sel .dot{background:var(--orange);border-color:var(--orange);}
.navrow{display:flex;justify-content:flex-end;gap:12px;margin-top:16px;}
.btn-next{background:var(--orange);color:var(--white);border:none;padding:12px 28px;font-size:0.82rem;font-weight:700;letter-spacing:2px;cursor:pointer;border-radius:2px;}
.btn-prev{background:transparent;color:var(--muted);border:1px solid var(--border);padding:12px 20px;font-size:0.82rem;cursor:pointer;border-radius:2px;}
.results{display:none;}
.score-big{font-family:'Bebas Neue',sans-serif;font-size:6rem;text-align:center;line-height:1;margin-bottom:6px;}
.score-lbl{font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted);letter-spacing:2px;text-align:center;margin-bottom:28px;}
.res-box{background:var(--panel);border:1px solid var(--border);padding:28px;border-radius:4px;margin-bottom:16px;}
.res-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:1px;margin-bottom:10px;}
.res-desc{color:var(--muted);font-size:0.86rem;line-height:1.7;}
.rec{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:0.82rem;color:var(--muted);}.rec:last-child{border:none;}
.retake{background:transparent;color:var(--orange);border:1px solid var(--orange);padding:11px 22px;font-size:0.78rem;font-family:'DM Sans',sans-serif;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;margin-right:10px;}
.back-btn{background:var(--orange);color:var(--white);padding:11px 22px;font-size:0.78rem;font-weight:700;letter-spacing:2px;text-decoration:none;border-radius:2px;display:inline-block;}
.cat-row{margin-bottom:14px;}.cat-top{display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:5px;}.cat-bg{background:var(--border);border-radius:2px;height:7px;overflow:hidden;}.cat-fill{height:100%;border-radius:2px;transition:width 0.7s;}
</style>
</head>
<body>
<div class="hdr"><a href="relationships.html" class="back">← BACK TO RELATIONSHIPS</a><div class="logo">THE YOUNG MAN <span>BLUEPRINT</span></div><div style="font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--muted);letter-spacing:2px;">RELATIONSHIPS TEST</div></div>
<div class="wrap">
<div class="eyebrow" style="color:var(--green);">🤝 Relationships Assessment</div>
<h1 class="title">HEALTHY OR UNHEALTHY?</h1>
<p class="sub">This covers your friendships, romantic relationships, family dynamics, and communication. No judgement — just honest signals.</p>
<div id="test-wrap">
  <div class="prog-top"><span id="pc">1 / 12</span><span id="pp">0%</span></div>
  <div class="prog-bar"><div class="prog-fill" id="pf" style="width:0%"></div></div>
  <div id="qw"></div>
  <div class="navrow"><button class="btn-prev" id="bp" onclick="prev()" style="display:none;">← Back</button><button class="btn-next" id="bn" onclick="next()">Next →</button></div>
</div>
<div class="results" id="results"></div>
</div>

<script>

const Q=[
{cat:"👥 Friendships",text:"How many genuine friends do you have — people you could call in a crisis?",opts:[{t:"None",s:0},{t:"1",s:1},{t:"2–3",s:2},{t:"4 or more",s:3}]},
{cat:"👥 Friendships",text:"When did you last spend real time with a friend (not online)?",opts:[{t:"I can't remember",s:0},{t:"Over a month ago",s:1},{t:"A couple of weeks",s:2},{t:"This week",s:3}]},
{cat:"👥 Friendships",text:"Do your friends support your growth or pull you down?",opts:[{t:"They actively pull me down",s:0},{t:"Neutral — mostly passive",s:1},{t:"Mixed",s:2},{t:"They challenge and support me",s:3}]},
{cat:"💬 Communication",text:"Can you express how you're actually feeling to someone close?",opts:[{t:"No — I keep everything inside",s:0},{t:"Rarely and awkwardly",s:1},{t:"Sometimes",s:2},{t:"Yes — I can be honest about my feelings",s:3}]},
{cat:"💬 Communication",text:"When you're in conflict, how do you handle it?",opts:[{t:"I shut down or blow up",s:0},{t:"I avoid it until it explodes",s:1},{t:"I try but it often goes sideways",s:2},{t:"I address it calmly and directly",s:3}]},
{cat:"❤️ Romantic",text:"Have you experienced controlling or toxic behaviour in relationships?",opts:[{t:"Yes — repeatedly",s:0},{t:"Yes in one relationship",s:1},{t:"Minor issues but mostly healthy",s:2},{t:"My relationships have been mostly healthy",s:3}]},
{cat:"❤️ Romantic",text:"Do you know your green flags and red flags in a partner?",opts:[{t:"Not at all",s:0},{t:"Vaguely",s:1},{t:"Mostly yes",s:2},{t:"Yes — I have clear standards",s:3}]},
{cat:"🧠 Self-Awareness",text:"Do you take responsibility in relationships or blame others?",opts:[{t:"Always the other person's fault",s:0},{t:"Lean toward blaming others",s:1},{t:"I try to look at my part",s:2},{t:"I take full ownership of my role",s:3}]},
{cat:"🧠 Self-Awareness",text:"Do you have patterns that repeat across relationships?",opts:[{t:"Yes — the same things keep happening",s:0},{t:"I notice them but don't address them",s:1},{t:"I'm aware and working on them",s:2},{t:"No obvious repeating patterns",s:3}]},
{cat:"🏠 Family",text:"How is your relationship with your immediate family?",opts:[{t:"Severely damaged or no contact",s:0},{t:"Strained and distant",s:1},{t:"Average with some tension",s:2},{t:"Mostly good and connected",s:3}]},
{cat:"🔋 Energy",text:"After spending time with the main people in your life, how do you feel?",opts:[{t:"Drained and exhausted",s:0},{t:"Often drained",s:1},{t:"Mixed",s:2},{t:"Mostly energized and supported",s:3}]},
{cat:"🔋 Energy",text:"Do you have relationships you know you should end or reassess?",opts:[{t:"Several",s:0},{t:"One significant one",s:1},{t:"Maybe — I'm unsure",s:2},{t:"No — my circle feels right",s:3}]}
];


var cur=0,ans=[];
function render(){
  var q=Q[cur],s=ans[cur];
  var w=document.getElementById('qw');
  var opts=q.opts.map(function(o,i){
    return '<div class="opt'+(s===i?' sel':'')+'" onclick="pick('+i+')"><div class="dot"></div><span>'+o.t+'</span></div>';
  }).join('');
  w.innerHTML='<div class="q-card">'+(q.cat?'<div class="q-cat">'+q.cat+'</div>':'')+'<div class="q-text">'+q.text+'</div><div class="opts">'+opts+'</div></div>';
  var pct=Math.round(((cur+1)/Q.length)*100);
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pp').textContent=pct+'%';
  document.getElementById('pc').textContent=(cur+1)+' / '+Q.length;
  document.getElementById('bp').style.display=cur>0?'block':'none';
  document.getElementById('bn').textContent=cur===Q.length-1?'See My Results →':'Next →';
}
function pick(i){ans[cur]=i;render();}
function next(){
  if(ans[cur]===undefined){
    document.querySelectorAll('.opt').forEach(function(o){o.style.borderColor='var(--red)';});
    setTimeout(function(){document.querySelectorAll('.opt').forEach(function(o){o.style.borderColor='';});},1200);
    return;
  }
  if(cur<Q.length-1){cur++;render();}else{showResults();}
}
function prev(){if(cur>0){cur--;render();}}
function retake(){cur=0;ans=[];document.getElementById('results').style.display='none';document.getElementById('test-wrap').style.display='block';render();}
function showResults(){
  document.getElementById('test-wrap').style.display='none';
  var r=document.getElementById('results');r.style.display='block';
  var total=ans.reduce(function(a,b){return a+(b||0);},0);
  var max=Q.length*3;
  var pct=Math.round((total/max)*100);
  var col=pct>=70?'var(--green)':pct>=40?'var(--amber)':'var(--red)';
  var gt,gd;
  if(pct>=75){gt='STRONG CONNECTIONS';gd='Your relationships show signs of health. Keep investing in the people who energize you and being honest in the ones that matter.';}
  else if(pct>=50){gt='ROOM TO BUILD';gd='You have some healthy foundations but clear gaps. Communication and choosing who gets your time are your biggest wins.';}
  else if(pct>=30){gt='PATTERNS TO BREAK';gd='There are repeating dynamics costing you. Consider what patterns you bring to every relationship — the common variable is always you.';}
  else{gt='ATTENTION NEEDED';gd='Your relationship health is low. Isolation and toxic dynamics are serious. Reach out to one person this week — a friend, family member, or counsellor.';}
  r.innerHTML='<div style="font-family:'Bebas Neue',sans-serif;font-size:5rem;text-align:center;color:'+col+';">'+pct+'</div>'
  +'<div style="font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted);letter-spacing:2px;text-align:center;margin-bottom:28px;">RELATIONSHIP HEALTH SCORE / 100</div>'
  +'<div class="res-box"><div class="res-title">'+gt+'</div><p class="res-desc">'+gd+'</p></div>'
  +'<div class="res-box"><div class="res-title" style="font-size:1.1rem;margin-bottom:12px;">ACTION PLAN</div>'
  +'<div class="rec"><span>🤝</span><span>Reach out to one person you've let drift — send a message or call this week.</span></div>'
  +'<div class="rec"><span>💬</span><span>Read "Attached" by Levine for relationship patterns and "Never Split the Difference" for communication.</span></div>'
  +'<div class="rec"><span>🔋</span><span>Audit your circle — who energizes you vs drains you. Invest your time accordingly.</span></div>'
  +'<div class="rec"><span>🪞</span><span>Journal about patterns that repeat in your relationships — what is the common variable?</span></div></div>'
  +'<div style="text-align:center;margin-top:20px;"><button class="retake" onclick="retake()">↩ Retake</button><a href="relationships.html" class="back-btn">← Back to Relationships</a></div>';
}
window.onload=function(){render();};

</script>
</body></html>
